name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: "Ruby ${{ matrix.ruby }} / Rails ${{ matrix.rails }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Rails 6.1 — only compatible with Ruby 3.0 and 3.1
          - ruby: "3.0"
            rails: "6.1"
          - ruby: "3.1"
            rails: "6.1"

          # Rails 7.0
          - ruby: "3.0"
            rails: "7.0"
          - ruby: "3.1"
            rails: "7.0"
          - ruby: "3.2"
            rails: "7.0"
          - ruby: "3.3"
            rails: "7.0"

          # Rails 7.1
          - ruby: "3.0"
            rails: "7.1"
          - ruby: "3.1"
            rails: "7.1"
          - ruby: "3.2"
            rails: "7.1"
          - ruby: "3.3"
            rails: "7.1"

          # Rails 7.2
          - ruby: "3.1"
            rails: "7.2"
          - ruby: "3.2"
            rails: "7.2"
          - ruby: "3.3"
            rails: "7.2"

          # Rails 8.0
          - ruby: "3.2"
            rails: "8.0"
          - ruby: "3.3"
            rails: "8.0"

          # Rails 8.1
          - ruby: "3.2"
            rails: "8.1"
          - ruby: "3.3"
            rails: "8.1"

    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_${{ matrix.rails }}.gemfile

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run tests
        run: |
          bundle exec ruby -Itest -e "Dir['test/components/**/*_test.rb'].each { |f| require File.expand_path(f) }"
