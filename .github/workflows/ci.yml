name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ---------------------------------------------------------------------------
  # Test suite — Ruby/Rails version matrix
  # ---------------------------------------------------------------------------
  test:
    name: "Ruby ${{ matrix.ruby }} / Rails ${{ matrix.rails }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Rails 7.0
          - ruby: "3.0"
            rails: "7.0"
          - ruby: "3.1"
            rails: "7.0"
          - ruby: "3.2"
            rails: "7.0"
          - ruby: "3.3"
            rails: "7.0"

          # Rails 7.1
          - ruby: "3.0"
            rails: "7.1"
          - ruby: "3.1"
            rails: "7.1"
          - ruby: "3.2"
            rails: "7.1"
          - ruby: "3.3"
            rails: "7.1"

          # Rails 7.2
          - ruby: "3.1"
            rails: "7.2"
          - ruby: "3.2"
            rails: "7.2"
          - ruby: "3.3"
            rails: "7.2"

          # Rails 8.0
          - ruby: "3.2"
            rails: "8.0"
          - ruby: "3.3"
            rails: "8.0"

          # Rails 8.1
          - ruby: "3.2"
            rails: "8.1"
          - ruby: "3.3"
            rails: "8.1"

    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_${{ matrix.rails }}.gemfile

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run tests
        run: |
          bundle exec ruby -Itest -e "Dir['test/components/**/*_test.rb'].each { |f| require File.expand_path(f) }"

  # ---------------------------------------------------------------------------
  # Lint — RuboCop
  # ---------------------------------------------------------------------------
  lint:
    name: RuboCop
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop --format github

  # ---------------------------------------------------------------------------
  # Security — bundler-audit
  # ---------------------------------------------------------------------------
  audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Update advisory database
        run: bundle exec bundler-audit update

      - name: Check for vulnerabilities
        run: bundle exec bundler-audit check

  # ---------------------------------------------------------------------------
  # Generators smoke test
  # ---------------------------------------------------------------------------
  generators:
    name: Generators smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: jet_ui

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: jet_ui
          bundler-cache: true

      - name: Create dummy Rails app
        run: |
          gem install rails -v "~> 8.1.0" --no-document
          rails new dummy_app --skip-git --skip-docker --skip-action-mailer \
            --skip-action-mailbox --skip-action-text --skip-active-job \
            --skip-active-storage --skip-action-cable --skip-hotwire \
            --skip-jbuilder --skip-brakeman --skip-kamal --skip-solid \
            --skip-rubocop --skip-test --quiet

      - name: Add jet_ui to dummy app
        working-directory: dummy_app
        run: |
          echo 'gem "jet_ui", path: "../jet_ui"' >> Gemfile
          echo 'gem "view_component"' >> Gemfile
          bundle install --quiet

      - name: Run jet_ui:install
        working-directory: dummy_app
        run: |
          mkdir -p app/assets/tailwind
          echo '@import "tailwindcss";' > app/assets/tailwind/application.css
          bundle exec rails generate jet_ui:install

      - name: Run jet_ui:eject btn
        working-directory: dummy_app
        run: bundle exec rails generate jet_ui:eject btn

      - name: Run jet_ui:eject card --skip-test --skip-preview
        working-directory: dummy_app
        run: bundle exec rails generate jet_ui:eject card --skip-test --skip-preview
